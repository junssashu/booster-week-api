services:
  db:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: booster_week
      POSTGRES_USER: booster_user
      POSTGRES_PASSWORD: booster_pass_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booster_user -d booster_week"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      network: host
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8003:8000"
    env_file:
      - .env
    environment:
      - MINIO_ENDPOINT=storage.bibliothequessolidaires.org
      - MINIO_PORT=443
      - MINIO_USE_SSL=true
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-app-storage-user}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-AppStorage2026Secure!}
      - MINIO_AUDIO_BUCKET=audios
      - MINIO_DOCUMENT_BUCKET=documents
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
